name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check app tests

      - name: Pytest
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci-secret-key-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        run: pytest -q --cov=app --cov-report=term-missing

      - name: Alembic migrations apply cleanly
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci.db
        run: alembic upgrade head

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::frontend/package.json not found — skipping"
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.exists == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        if: steps.detect.outputs.exists == 'true'
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t raybags-backend:ci ./backend
      - name: Build frontend image
        run: |
          if [ -f frontend/Dockerfile ]; then
            docker build -t raybags-frontend:ci ./frontend
          else
            echo "::notice::frontend/Dockerfile not found — skipping"
          fi
