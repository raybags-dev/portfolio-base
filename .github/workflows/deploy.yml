name: CI + Deploy

# Runs automatically on every push to main.
# Pipeline: test → build & push Docker Hub images → SSH deploy to prod
#
# Required GitHub secrets (repo Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME   — Docker Hub account name
#   DOCKERHUB_TOKEN      — Docker Hub access token (read/write access)
#   SSH_HOST             — VPS IP (89.167.74.127)
#   SSH_USER             — SSH login user (root)
#   SSH_KEY              — private SSH key for the VPS
#   SSH_PORT             — (optional) defaults to 22
#
# To add a manual approval gate before production:
#   Go to repo Settings → Environments → production → add Required reviewers.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Tests — backend lint + pytest + frontend typecheck + build
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Backend — install deps
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Backend — ruff lint
        working-directory: backend
        run: ruff check app tests

      - name: Backend — pytest
        working-directory: backend
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci-secret-key-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        run: pytest -q --tb=short

      - name: Backend — alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci.db
        run: alembic upgrade head

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — install & typecheck
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit

      - name: Frontend — production build
        working-directory: frontend
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build Docker images and push to Docker Hub
  # ──────────────────────────────────────────────────────────────────────────
  docker-publish:
    name: Build & push images
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}
          password: ${{ secrets.DOCKERHUB_TOKEN_PERSONAL }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}/raybags-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}/raybags-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://raybags.com
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}/raybags-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}/raybags-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Pull new images on the VPS and restart the stack
  # ──────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to production
    needs: [docker-publish]
    runs-on: ubuntu-latest
    environment: production  # add required reviewers for a manual approval gate
    steps:
      - uses: actions/checkout@v4

      - name: SCP → sync config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "infra/nginx/,docker-compose.vps.yml,scripts/"
          target: /mnt/portfolio-data/app/
          strip_components: 0

      - name: SSH → pull images & restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME_PERSONAL }}"
            export IMAGE_TAG="${{ github.sha }}"
            bash /mnt/portfolio-data/app/scripts/prod-deploy.sh
            # Reload nginx config without dropping connections (picks up volume-mounted changes).
            docker compose -f /mnt/portfolio-data/app/docker-compose.vps.yml \
              --env-file /mnt/portfolio-data/app/.env.prod \
              exec -T nginx nginx -s reload
