name: CI + Deploy

# Runs automatically on every push to main.
# Pipeline: test → build & push ghcr.io images → SSH deploy to prod
#
# Required GitHub secrets (repo Settings → Secrets → Actions):
#   SSH_HOST   — VPS IP
#   SSH_USER   — SSH login user (root)
#   SSH_KEY    — private SSH key for the VPS
#   SSH_PORT   — (optional) defaults to 22
#
# Images are pushed to ghcr.io using the automatic GITHUB_TOKEN — no extra
# registry secret needed. The VPS pulls using the same token during the
# workflow run, so no separate GHCR_TOKEN secret is required.
#
# After the first push, make the packages public in:
#   github.com → Packages → raybags-backend/frontend → Package settings → Make public
# (optional, but lets the VPS pull without auth on manual redeploys)
#
# To add a manual approval gate before production:
#   Go to repo Settings → Environments → production → add Required reviewers.

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

concurrency:
  group: deploy-main
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Tests — backend lint + pytest + frontend typecheck + build
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Backend — install deps
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Backend — ruff lint
        working-directory: backend
        run: ruff check app tests

      - name: Backend — pytest
        working-directory: backend
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci-secret-key-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        run: pytest -q --tb=short

      - name: Backend — alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci.db
        run: alembic upgrade head

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — install & typecheck
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit

      - name: Frontend — production build
        working-directory: frontend
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build Docker images and push to GitHub Container Registry (ghcr.io)
  # ──────────────────────────────────────────────────────────────────────────
  docker-publish:
    name: Build & push images
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/raybags-backend:latest
            ghcr.io/${{ github.repository_owner }}/raybags-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://raybags.com
          tags: |
            ghcr.io/${{ github.repository_owner }}/raybags-frontend:latest
            ghcr.io/${{ github.repository_owner }}/raybags-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Pull new images on the VPS and restart the stack
  # ──────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to production
    needs: [docker-publish]
    runs-on: ubuntu-latest
    environment: production  # add required reviewers for a manual approval gate
    steps:
      - uses: actions/checkout@v4

      - name: SCP → sync config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "infra/nginx/,docker-compose.vps.yml,scripts/"
          target: /mnt/portfolio-data/app/
          strip_components: 0

      - name: SSH → pull images & restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            export GHCR_OWNER="${{ github.repository_owner }}"
            export GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            export IMAGE_TAG="${{ github.sha }}"
            bash /mnt/portfolio-data/app/scripts/prod-deploy.sh
            # Reload nginx config without dropping connections (picks up volume-mounted changes).
            docker compose -f /mnt/portfolio-data/app/docker-compose.vps.yml \
              --env-file /mnt/portfolio-data/app/.env.prod \
              exec -T nginx nginx -s reload
