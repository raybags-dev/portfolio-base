[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = ["venv", "alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W"]
ignore = [
    "E501",   # line length handled by formatter
    "B008",   # FastAPI Depends() in defaults is idiomatic
    "UP046",  # Generic[T] base is fine; py312 type-params not required
]

[tool.ruff.lint.per-file-ignores]
# conftest sets env vars before importing the app on purpose.
"tests/conftest.py" = ["E402"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
