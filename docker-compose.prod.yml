# Production overlay: stricter restarts, no debug, resource limits.
# Used as:  docker compose -f docker-compose.yml -f docker-compose.prod.yml ...
services:
  backend:
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
  frontend:
    restart: always
  nginx:
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
