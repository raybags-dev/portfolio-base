# =============================================================================
# Raybags Data Platform — base compose (core services).
# Heavy / optional services (Kafka, RabbitMQ, MinIO, workers, monitoring) live
# in compose profiles so you only start what you need:
#
#   docker compose up -d                         # core: postgres, redis, backend, frontend, nginx
#   docker compose --profile messaging up -d     # + kafka, rabbitmq
#   docker compose --profile storage up -d       # + minio
#   docker compose --profile monitoring up -d    # + prometheus, grafana
#   docker compose --profile all up -d           # everything
# =============================================================================

x-backend-env: &backend-env
  ENVIRONMENT: ${ENVIRONMENT:-production}
  DEBUG: ${DEBUG:-false}
  SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-raybags}:${POSTGRES_PASSWORD:-raybags}@postgres:5432/${POSTGRES_DB:-raybags}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
  REDIS_URL: redis://redis:6379/0
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@raybags.com}
  FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:?set FIRST_ADMIN_PASSWORD in .env}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
  KAGGLE_KEY: ${KAGGLE_KEY:-}
  DISCORD_WEBHOOK: ${DISCORD_WEBHOOK:-}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raybags}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-raybags}
      POSTGRES_DB: ${POSTGRES_DB:-raybags}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raybags}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [platform]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [platform]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run migrations, then start the API.
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    expose: ["8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [platform]

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    expose: ["3000"]
    networks: [platform]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx-lb.config:/etc/nginx/conf.d/default.conf:ro
    # Allows nginx to reach the annotation platform stack on host port 5174.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
      - frontend
    networks: [platform]

  # ---------------- messaging profile ----------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    profiles: ["messaging", "all"]
    ports:
      - "15672:15672"   # management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks: [platform]

  kafka:
    image: bitnami/kafka:3.9
    restart: unless-stopped
    profiles: ["messaging", "all"]
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    volumes:
      - kafkadata:/bitnami/kafka
    networks: [platform]

  # ---------------- storage profile ----------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    profiles: ["storage", "all"]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    networks: [platform]

  # ---------------- monitoring profile ----------------
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    profiles: ["monitoring", "all"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    networks: [platform]

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    profiles: ["monitoring", "all"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks: [platform]

volumes:
  pgdata:
  redisdata:
  kafkadata:
  miniodata:
  promdata:
  grafanadata:

networks:
  platform:
    driver: bridge
