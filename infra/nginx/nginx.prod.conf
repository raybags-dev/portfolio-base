# =============================================================================
# Production Nginx — raybags.com
# HTTP  → HTTPS redirect + Let's Encrypt webroot renewal path
# HTTPS → backend:8000 (/api, /docs, /redoc, /metrics) + frontend:3000 (/)
# Sits behind Cloudflare in Full (strict) mode.
# =============================================================================

# Cloudflare IP ranges — real client IP comes in CF-Connecting-IP
geo $cloudflare_ip {
    default          0;
    103.21.244.0/22  1;
    103.22.200.0/22  1;
    103.31.4.0/22    1;
    104.16.0.0/13    1;
    104.24.0.0/14    1;
    108.162.192.0/18 1;
    131.0.72.0/22    1;
    141.101.64.0/18  1;
    162.158.0.0/15   1;
    172.64.0.0/13    1;
    173.245.48.0/20  1;
    188.114.96.0/20  1;
    190.93.240.0/20  1;
    197.234.240.0/22 1;
    198.41.128.0/17  1;
    2400:cb00::/32   1;
    2606:4700::/32   1;
    2803:f800::/32   1;
    2405:b500::/32   1;
    2405:8100::/32   1;
    2a06:98c0::/29   1;
    2c0f:f248::/32   1;
}

map $cloudflare_ip $real_client_ip {
    1       $http_cf_connecting_ip;
    default $remote_addr;
}

upstream backend_api {
    server backend:8000;
    keepalive 16;
}

upstream frontend_app {
    server frontend:3000;
    keepalive 16;
}

# ---- HTTP: redirect all to HTTPS, but keep certbot webroot working ----
server {
    listen 80;
    listen [::]:80;
    server_name raybags.com www.raybags.com;

    # Let's Encrypt webroot renewal (must stay on HTTP, no redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: main vhost ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name raybags.com www.raybags.com;

    # ---- TLS ----
    ssl_certificate     /etc/letsencrypt/live/raybags.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/raybags.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/raybags.com/chain.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options          "SAMEORIGIN"                           always;
    add_header X-Content-Type-Options   "nosniff"                              always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"      always;
    add_header X-XSS-Protection         "1; mode=block"                        always;

    client_max_body_size 50m;

    # Forward real client IP (Cloudflare sends CF-Connecting-IP)
    set_real_ip_from 0.0.0.0/0;
    real_ip_header   CF-Connecting-IP;

    # ---- Backend: API, docs, metrics ----
    location /api/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $real_client_ip;
        proxy_set_header   X-Forwarded-For   $real_client_ip;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    location ~ ^/(docs|redoc|openapi\.json|metrics)$ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ---- Frontend: everything else ----
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $real_client_ip;
        proxy_set_header   X-Forwarded-For   $real_client_ip;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # ---- certbot renewal path kept open on HTTPS too (belt-and-suspenders) ----
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
}
