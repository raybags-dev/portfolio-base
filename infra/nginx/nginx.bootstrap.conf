# =============================================================================
# Bootstrap Nginx — HTTP only (no TLS, pre-cert).
# Used for initial deploy before Let's Encrypt cert is issued.
# Switch to nginx.prod.conf after running scripts/issue-cert.sh.
#
# Cloudflare in "Flexible" SSL mode handles HTTPS to the browser.
# =============================================================================

upstream backend_api {
    server backend:8000;
    keepalive 16;
}

upstream frontend_app {
    server frontend:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name raybags.com www.raybags.com _;

    client_max_body_size 50m;

    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Let's Encrypt webroot (used by scripts/issue-cert.sh)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location /api/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    location ~ ^/(docs|redoc|openapi\.json|metrics)$ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
    }

    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  "upgrade";
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $http_cf_connecting_ip;
        proxy_read_timeout 60s;
    }
}
